<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style/style.css">
        <link rel="icon" type="image/x-icon" href="asset/tnj.png">
        <link rel="preload" href="Agipo-Regular.woff2" as="font" type="font/woff2" crossorigin>
        <title>Tom and Jamie</title>
      </head>
<body>
    <a href="logo.html" class="page-link"></a>
    <a class="rand is-1" href="">
        <img src="asset/www.png" alt="">
      </a>
      
      <a class="rand is-2" href="">
        <img src="" alt="">
      </a>
      

    <div class="container">
        <div class="main">
            <p>Tom and Jamie are here!<br>worldwideweb(dot)tomnjamie(dot)com
            </p>
        </div>
    </div>
    <script>
        document.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', function (e) {
            const href = this.getAttribute('href');
      
            if (!href || href.startsWith('#') || this.target === '_blank') return;
      
            e.preventDefault();
            document.body.classList.add('is-leaving');
      
            setTimeout(() => {
              window.location.href = href;
            }, 250);
          });
        });
      </script>
</body>
</html>
