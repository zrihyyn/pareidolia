<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style/style.css">
        <link rel="icon" type="image/png" href="asset/tnj.png">
        <link rel="preload" href="Agipo-Regular.woff2" as="font" type="font/woff2" crossorigin>
        <title>Tom and Jamie</title>
      </head>
<body>
    <a href="3d.html" class="page-link"></a>
    <div class="rand is-1">
      <img src="asset/skateboard-tom.jpg" alt="">
     </div>

     <div class="rand is-2">
      <img src="asset/skateboard-jamie.jpg" alt="">
     </div>
    

    <div class="container">
        <div class="main">
            <p>Tom and Jamie are in The Hague
            </p>
        </div>
    </div>
    <script>
      const link = document.querySelector('.page-link');
    
      if (link) {
        link.addEventListener('click', function (e) {
          const href = this.getAttribute('href');
          if (!href) return;
    
          e.preventDefault();
          document.body.classList.add('is-leaving');
    
          setTimeout(() => {
            window.location.href = href;
          }, 250);
        });
      }
    </script>
</body>
</html>
