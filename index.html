    <script>
      const link = document.querySelector('.page-link');
    
      if (link) {
        link.addEventListener('click', function (e) {
          const href = this.getAttribute('href');
          if (!href) return;
    
          e.preventDefault();
          document.body.classList.add('is-leaving');
    
          setTimeout(() => {
            window.location.href = href;
          }, 250);
